<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Luggers Logo Preview</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #CC0000;
            margin-bottom: 30px;
        }
        .preview-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            background: #000;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #CC0000;
        }
        .preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .preview-item h3 {
            color: #CC0000;
            margin: 0;
        }
        .preview-item img {
            background: radial-gradient(circle, #2a2a2a 0%, #000 100%);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #CC0000;
        }
        .large img {
            width: 425px;
            height: 425px;
        }
        .medium img {
            width: 284px;
            height: 284px;
        }
        .small img {
            width: 142px;
            height: 142px;
        }
    </style>
</head>
<body>
    <h1>Black Luggers Logo - Blood Red Edition</h1>
    <p>Pilot Cap + Skull + Wings Design</p>
    
    <div class="preview-container">
        <div class="preview-item large">
            <h3>Large (425px)</h3>
            <img src="black-luggers-logo-stylized-large.png" alt="Large logo">
        </div>
        
        <div class="preview-item medium">
            <h3>Medium (142px)</h3>
            <img src="black-luggers-logo-stylized-medium.png" alt="Medium logo">
        </div>
        
        <div class="preview-item small">
            <h3>Small (71px)</h3>
            <img src="black-luggers-logo-stylized-small.png" alt="Small logo">
        </div>
    </div>
</body>
</html>
